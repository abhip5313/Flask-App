<div class="success-card">
    <h2>✅ Registration Successful</h2>

    <table border="1">
        <tr>
            <th>Full Name</th>
            <td>{{ user.fullname }}</td>
        </tr>
        <tr>
            <th>Email</th>
            <td>{{ user.email }}</td>
        </tr>
        <tr>
            <th>Phone</th>
            <td>{{ user.phone }}</td>
        </tr>
        <tr>
            <th>Username</th>
            <td>{{ user.username }}</td>
        </tr>
        <tr>
            <th>Password</th>
            <td>{{ user.password }}</td>
        </tr>
    </table>

    <br>
    <a href="{{ url_for('show_users') }}">
    <button style="padding:10px 20px; background-color:green; color:white; border:none; border-radius:5px;">
        View All Users
    </button>
</a>

<a href="{{ url_for('register') }}">
    <button style="padding:10px 20px; background-color:blue; color:white; border:none; border-radius:5px;">
        Back to Register
    </button>
</a>
</div>
