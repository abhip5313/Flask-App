<div class="success-card">
    <h2>✅ Registration Successful</h2>

    <table border="1">
        <tr>
            <th>Full Name</th>
            <td>{{ user.fullname }}</td>
        </tr>
        <tr>
            <th>Email</th>
            <td>{{ user.email }}</td>
        </tr>
        <tr>
            <th>Phone</th>
            <td>{{ user.phone }}</td>
        </tr>
        <tr>
            <th>Username</th>
            <td>{{ user.username }}</td>
        </tr>
        <tr>
            <th>Password</th>
            <td>{{ user.password }}</td>
        </tr>
    </table>

    <br>
    <a href="/">Go Back</a>
</div>
